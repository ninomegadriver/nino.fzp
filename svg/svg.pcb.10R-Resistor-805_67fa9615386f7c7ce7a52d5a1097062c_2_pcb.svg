<!--	
	The pad size of this SMD -0805- refers to document number 28745 from www.vishay.com.
	The silkscreen outlines have a thickness of 0.1 mm.
	The space between silkscreen and pads is also 0.1 mm thick.
	From this follows that there is a keepout array of 0.2 mm around the depth (X) and the length (Y)
	(see doc# 28745 from www.vishay.com).
-->
<svg xmlns="http://www.w3.org/2000/svg"  id="svg2" height="1.9mm" version="1.1" gorn="0" viewBox="0 0 385 190" width="3.85mm">
    <desc>
        <referenceFile>SMD_0805.svg</referenceFile>
    </desc>
    <g  id="copper1" gorn="0.0">
        <rect  id="connector0pad" height="150" x="20" gorn="0.0.0" width="140" style="fill:#f7bf13;fill-opacity:1;stroke:none;stroke-width:0" y="20"/>
        <rect  id="connector1pad" height="150" x="225" gorn="0.0.1" width="140" style="fill:#f7bf13;fill-opacity:1;stroke:none;stroke-width:0" y="20"/>
    </g>
    <g  id="silkscreen" gorn="0.1">
        <rect  id="silkscreen" height="180" x="5" gorn="0.1.0" width="375" style="fill:none;stroke:#ffffff;stroke-width:10;stroke-opacity:1" y="5"/>
    </g>
</svg>
