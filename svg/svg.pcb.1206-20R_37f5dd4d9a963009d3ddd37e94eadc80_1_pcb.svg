<!--	
	The pad size of this SMD -1206- refers to document number 28745 from www.vishay.com.
	The silkscreen outlines have a thickness of 0.1 mm.
	The space between silkscreen and pads is also 0.1 mm thick.
	From this follows that there is a keepout array of 0.2 mm around the depth (X) and the length (Y)
	(see doc# 28745 from www.vishay.com).
-->
<svg xmlns="http://www.w3.org/2000/svg" height="2.3mm" id="svg2" viewBox="0 0 510 230" version="1.1" width="5.1mm" gorn="0" >
    <desc>
        <referenceFile>SMD_1206.svg</referenceFile>
    </desc>
    <g id="copper1" gorn="0.0" >
        <rect height="190" id="connector0pad" y="20" style="fill:#f7bf13;fill-opacity:1;stroke:none;stroke-width:0" x="20" width="160" gorn="0.0.0" />
        <rect height="190" id="connector1pad" y="20" style="fill:#f7bf13;fill-opacity:1;stroke:none;stroke-width:0" x="330" width="160" gorn="0.0.1" />
    </g>
    <g id="silkscreen" gorn="0.1" >
        <rect height="220" id="silkscreen" y="5" style="fill:none;stroke:#ffffff;stroke-width:10;stroke-opacity:1" x="5" width="500" gorn="0.1.0" />
    </g>
</svg>
